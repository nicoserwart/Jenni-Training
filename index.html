<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jennis Plan">
<meta name="theme-color" content="#0a0a0f">
<title>Jennis Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface-2: #161622;
  --card: #171723;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.14);
  --text: #f0f0ff;
  --sub: #9494b3;
  --active: #7dd4f0;
  --active-glow: rgba(125,212,240,0.18);
  --active-dark: #16495a;
  --success: #22c55e;
  --warn: #f59e0b;
  --shadow-soft: 0 8px 30px rgba(0,0,0,.24);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:radial-gradient(circle at top,rgba(125,212,240,0.07),transparent 28%),var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:110px;
}
button,input{font:inherit;}
::-webkit-scrollbar{width:0;height:0;}
.safe-bottom{height:env(safe-area-inset-bottom,0px);}

.app-header{
  padding:max(env(safe-area-inset-top),20px) 16px 10px;
  text-align:center;
  background:rgba(10,10,15,0.88);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.app-header h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(26px,7vw,38px);
  letter-spacing:2px;color:var(--text);line-height:1;
}
.app-header .subtitle{font-size:11px;color:var(--sub);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:5px;}
.accent-line{width:60px;height:3px;background:linear-gradient(90deg,var(--active),transparent);margin:8px auto 0;border-radius:2px;}

.phase-tabs,.day-tabs{display:flex;overflow-x:auto;gap:8px;padding:12px 16px;scrollbar-width:none;}
.phase-tabs::-webkit-scrollbar,.day-tabs::-webkit-scrollbar{display:none;}
.phase-tab,.day-tab{
  flex-shrink:0;padding:10px 16px;border-radius:999px;
  border:1px solid var(--border);background:var(--surface);color:var(--sub);
  font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;
  white-space:nowrap;text-transform:uppercase;letter-spacing:.6px;
}
.phase-tab.active{
  background:linear-gradient(180deg,var(--active),color-mix(in srgb,var(--active) 70%,black));
  border-color:var(--active);color:#0a0a0f;
  box-shadow:0 0 16px var(--active-glow);
}
.day-tab.active{background:rgba(255,255,255,0.06);border-color:var(--active);color:var(--active);}

.week-selector{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px 4px;}
.week-label{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;}
.week-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.week-btn{
  width:38px;height:38px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface);color:var(--sub);
  font-weight:800;font-size:13px;cursor:pointer;transition:all .2s;
}
.week-btn.active{background:var(--active);border-color:var(--active);color:#0a0a0f;box-shadow:0 0 14px var(--active-glow);}

.progress-bar-wrap{padding:4px 16px 12px;}
.progress-bar-track{height:6px;background:var(--surface-2);border-radius:999px;overflow:hidden;border:1px solid var(--border);}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--active),color-mix(in srgb,var(--active) 70%,white));border-radius:999px;transition:width .4s;}
.progress-text{font-size:11px;color:var(--sub);text-align:right;margin-top:6px;font-weight:600;}

.section-label{padding:6px 16px 10px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--sub);}
.exercise-list{padding:0 16px;display:flex;flex-direction:column;gap:12px;}

.ex-card{
  background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent),var(--card);
  border:1px solid var(--border);border-radius:22px;overflow:hidden;
  transition:border-color .2s;box-shadow:var(--shadow-soft);
}
.ex-card.logged{border-color:rgba(34,197,94,.55);}
.ex-header{display:flex;align-items:flex-start;gap:12px;padding:16px 16px 14px;cursor:pointer;}
.ex-index{
  width:34px;height:34px;border-radius:12px;background:var(--surface-2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:var(--sub);flex-shrink:0;
}
.ex-title{flex:1;min-width:0;}
.ex-name{font-weight:800;font-size:15px;color:var(--text);line-height:1.2;}
.ex-meta{font-size:11px;color:var(--sub);margin-top:4px;line-height:1.35;}
.ex-badge{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.badge{padding:5px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
.badge-weight{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border);}
.badge-pct{background:var(--active-dark);color:var(--active);border:1px solid rgba(255,255,255,0.04);}
.ex-body{padding:0 16px 16px;display:none;border-top:1px solid rgba(255,255,255,0.05);}
.ex-body.open{display:block;}

.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0 12px;}
.info-cell{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px;text-align:center;}
.info-val{font-size:16px;font-weight:800;color:var(--text);}
.info-key{font-size:10px;color:var(--sub);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}

.notes-badge{
  font-size:11px;color:var(--warn);
  background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);
  border-radius:14px;padding:10px 12px;margin-bottom:12px;
}

.set-log-list{display:flex;flex-direction:column;gap:10px;}
.set-row{
  display:grid;grid-template-columns:52px 1fr 1fr 92px;gap:8px;align-items:end;
  background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:10px;
}
.set-number{
  height:46px;display:flex;align-items:center;justify-content:center;
  border-radius:12px;background:var(--surface-2);border:1px solid var(--border);
  font-size:12px;font-weight:800;color:var(--sub);
}
.log-input-wrap{min-width:0;}
.log-input{
  width:100%;background:#101019;border:1px solid var(--border-strong);
  border-radius:12px;color:var(--text);font-size:15px;font-weight:700;
  padding:13px 10px;text-align:center;-webkit-appearance:none;
}
.log-input:focus{outline:none;border-color:var(--active);box-shadow:0 0 0 3px var(--active-glow);}
.log-label{font-size:10px;color:var(--sub);font-weight:800;text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-top:4px;}
.set-save-btn{
  height:46px;background:var(--active);border:none;border-radius:12px;
  color:#0a0a0f;font-weight:800;font-size:12px;cursor:pointer;
  letter-spacing:.4px;text-transform:uppercase;box-shadow:0 0 12px var(--active-glow);
}
.set-save-btn.saved{background:var(--success);color:#fff;box-shadow:none;}

.exercise-actions{display:flex;gap:8px;margin-top:12px;}
.action-btn{
  flex:1;padding:12px 14px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-weight:700;cursor:pointer;font-size:13px;
}
.action-btn.primary{background:var(--active);border-color:var(--active);color:#0a0a0f;box-shadow:0 0 14px var(--active-glow);}

.settings-btn{
  position:fixed;bottom:max(env(safe-area-inset-bottom),18px);right:16px;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(180deg,var(--active),color-mix(in srgb,var(--active) 72%,black));
  border:none;cursor:pointer;font-size:22px;z-index:200;
  box-shadow:0 8px 30px var(--active-glow);transition:all .25s;
}
.settings-btn:active{transform:scale(.94);}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:300;display:none;align-items:flex-end;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.modal-overlay.open{display:flex;}
.modal{
  width:100%;max-height:90vh;background:var(--surface);
  border-radius:28px 28px 0 0;border-top:1px solid var(--border);
  overflow-y:auto;padding:20px 16px max(env(safe-area-inset-bottom),20px);
}
.modal-handle{width:46px;height:5px;border-radius:999px;background:var(--border-strong);margin:0 auto 16px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text);margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--sub);margin-bottom:18px;line-height:1.45;}
.xrm-group{margin-bottom:18px;}
.xrm-group-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--active);margin-bottom:8px;}
.xrm-row{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px;margin-bottom:8px;
}
.xrm-label-wrap{flex:1;display:flex;flex-direction:column;gap:2px;}
.xrm-label{font-weight:800;font-size:13px;color:var(--text);}
.xrm-hint{font-size:10px;color:var(--sub);font-weight:500;line-height:1.35;}
.xrm-input{
  width:78px;background:#101019;border:1px solid var(--border-strong);border-radius:12px;
  color:var(--text);font-weight:800;font-size:14px;padding:10px;text-align:center;-webkit-appearance:none;
}
.xrm-input:focus{outline:none;border-color:var(--active);}
.xrm-unit{font-size:11px;color:var(--sub);font-weight:700;}
.save-xrm-btn{
  width:100%;padding:16px;border-radius:16px;border:none;
  background:var(--active);color:#0a0a0f;font-weight:800;font-size:15px;
  cursor:pointer;letter-spacing:.8px;text-transform:uppercase;margin-top:8px;
  box-shadow:0 0 20px var(--active-glow);
}
.save-xrm-btn:active{opacity:.7;}

.save-toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  background:var(--success);color:#fff;border-radius:999px;
  padding:10px 20px;font-weight:800;font-size:13px;z-index:400;
  display:none;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.25);
}
.save-toast.show{display:block;}
.empty{text-align:center;padding:44px 20px;color:var(--sub);}

@media(max-width:420px){
  .set-row{grid-template-columns:46px 1fr 1fr 84px;}
  .badge{font-size:9px;padding:4px 8px;}
  .ex-header{padding:14px;}
}
</style>
</head>
<body>

<div class="save-toast" id="toast">Gespeichert</div>

<div class="app-header">
  <h1>Jennis Plan</h1>
  <div class="subtitle">Hypertrophie &amp; Kraft</div>
  <div class="accent-line"></div>
</div>

<div class="phase-tabs" id="phaseTabs"></div>
<div class="week-selector" id="weekSelector"></div>
<div class="day-tabs" id="dayTabs"></div>
<div class="progress-bar-wrap">
  <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0 Sätze geloggt</div>
</div>
<div class="exercise-list" id="exList"></div>

<button class="settings-btn" onclick="openSettings()">&#9881;&#65039;</button>

<div class="modal-overlay" id="xrmModal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">XRM Einstellungen</div>
    <div class="modal-sub">XRM = dein Arbeitsgewicht für eine bestimmte Wdh-Zahl. Die App berechnet daraus automatisch dein Trainingsgewicht pro Phase und Woche.</div>
    <div id="xrmFields"></div>
    <button class="save-xrm-btn" onclick="saveXRM()">Speichern &amp; berechnen</button>
  </div>
</div>

<div class="safe-bottom"></div>

<script>
// ── XRM DEFINITIONEN ────────────────────────────────────
const XRM_DEFS = [
  {group:'Beine & Hüfte', items:[
    {key:'beinpresse', label:'Beinpresse',  hint:'12RM – Gewicht mit dem du genau 12 Wdh schaffst'},
    {key:'rdl',        label:'RDLs',         hint:'10RM – Gewicht mit dem du genau 10 Wdh schaffst'},
    {key:'beinbeuger', label:'Beinbeuger',   hint:'12RM – Gewicht mit dem du genau 12 Wdh schaffst'},
    {key:'hipthrust',  label:'Hip Thrust',   hint:'10RM – Gewicht mit dem du genau 10 Wdh schaffst'},
    {key:'kickbacks',  label:'Kickbacks',    hint:'15RM – Gewicht mit dem du genau 15 Wdh schaffst'},
  ]},
  {group:'Rücken & Zug', items:[
    {key:'latzug', label:'Latzug', hint:'10RM – Gewicht mit dem du genau 10 Wdh schaffst'},
    {key:'rudern', label:'Rudern', hint:'10RM – Gewicht mit dem du genau 10 Wdh schaffst'},
  ]},
  {group:'Drücken', items:[
    {key:'bankdruecken', label:'Bankdrücken',   hint:'10RM – Gewicht mit dem du genau 10 Wdh schaffst'},
    {key:'incline',      label:'Incline Press',  hint:'10RM – Gewicht mit dem du genau 10 Wdh schaffst'},
  ]},
  {group:'Schulter & Arme', items:[
    {key:'seitheben', label:'Seitheben',    hint:'15RM – Gewicht mit dem du genau 15 Wdh schaffst'},
    {key:'bizeps',    label:'Bizeps Curl',  hint:'12RM – Gewicht mit dem du genau 12 Wdh schaffst'},
    {key:'trizeps',   label:'Trizeps',      hint:'12RM – Gewicht mit dem du genau 12 Wdh schaffst'},
  ]},
  {group:'Core', items:[
    {key:'crunches', label:'Crunches', hint:'15RM – Zusatzgewicht für genau 15 Wdh'},
  ]},
];

const XRM_DEFAULTS = {
  beinpresse:80, rdl:40, beinbeuger:30, hipthrust:50, kickbacks:20,
  latzug:40, rudern:35, bankdruecken:30, incline:20,
  seitheben:8, bizeps:10, trizeps:12, crunches:5,
};

// ── PHASEN ──────────────────────────────────────────────
const PHASES = [
  {id:'volume',    label:'Volume',    weeks:4},
  {id:'intensity', label:'Intensity', weeks:4},
  {id:'strength',  label:'Strength',  weeks:5},
  {id:'deload1',   label:'Deload 1',  weeks:2},
  {id:'deload2',   label:'Deload 2',  weeks:1},
];

// Tage: Montag / Freitag / Samstag
// FREITAG = Beine-Tag (war früher Samstag-Inhalt)
// SAMSTAG = OBK-Tag   (war früher Freitag-Inhalt)
const DAY_LABELS = ['Montag', 'Freitag', 'Samstag'];
const DAY_SUBTITLES = ['Beine & Pull', 'Beine', 'Oberkörper'];

// ── EPLEY-BASIERTE GEWICHTSBERECHNUNG ───────────────────
//
// Jenni trägt ihr XRM (z.B. 40kg @ 10 Reps) ein.
// Die App berechnet daraus den 1RM (Epley), und davon
// das korrekte Gewicht für die Ziel-Repzahl der jeweiligen Phase.
//
// 1RM  = xrmKg * (1 + xrmReps / 30)
// Ziel = 1RM  / (1 + zielReps / 30)
//
// So steigt das Gewicht automatisch wenn die Reps sinken:
//   Volume    (14 Ziel-Reps) → leichter
//   Intensity (10 Ziel-Reps) → mittel
//   Strength  ( 6 Ziel-Reps) → schwerer  ✓
//   Deload    (12 Ziel-Reps) → regenerativ

// XRM-Referenz-Reps (wie viele Wdh beim eingetragenen Gewicht)
const XRM_REF_REPS = {
  beinpresse:12, rdl:10, beinbeuger:12, hipthrust:10, kickbacks:15,
  latzug:10, rudern:10, bankdruecken:10, incline:10,
  seitheben:15, bizeps:12, trizeps:12, crunches:15,
};

// Ziel-Reps pro Phase (Mitte des Bereichs, für Gewichtsberechnung)
// Main-Übungen / Accessory-Übungen
// Woche für Woche leicht ansteigend (RIR sinkt)
const PHASE_CFG = {
  //                   zielReps Main je Woche    zielReps Acc je Woche
  volume:    { repsMain:[14,13,12,11], repsAcc:[17,16,15,14], sMain:3, sAcc:3, rMain:'12-15', rAcc:'15-20', restMain:'2:00', restAcc:'1:30' },
  intensity: { repsMain:[11,10, 9, 8], repsAcc:[14,13,12,11], sMain:3, sAcc:3, rMain:'8-12',  rAcc:'12-15', restMain:'2:30', restAcc:'2:00' },
  strength:  { repsMain:[ 8, 7, 6, 6, 5], repsAcc:[11,10, 9, 8, 8], sMain:3, sAcc:3, rMain:'5-8',   rAcc:'10-12', restMain:'3:00', restAcc:'2:00' },
  deload1:   { repsMain:[13,12], repsAcc:[14,13], sMain:2, sAcc:2, rMain:'10-15', rAcc:'12-15', restMain:'1:30', restAcc:'1:00' },
  deload2:   { repsMain:[11],    repsAcc:[13],    sMain:2, sAcc:2, rMain:'10-12', rAcc:'12-15', restMain:'1:30', restAcc:'1:00' },
};

// Berechnet Trainingsgewicht via Epley
// xrmKg: eingetragenes Gewicht, xrmReps: Referenz-Reps dafür, targetReps: gewünschte Reps
function epleyWeight(xrmKg, xrmReps, targetReps) {
  const kg = Number(xrmKg) || 0;
  if (kg <= 0) return 0;
  const oneRM = kg * (1 + xrmReps / 30);
  return oneRM / (1 + targetReps / 30);
}

function calcWeight(xrm, key, targetReps) {
  const refReps = XRM_REF_REPS[key] || 10;
  return r25(epleyWeight(xrm[key] || 0, refReps, targetReps));
}

function buildExercises(phase, weekIdx, day) {
  const cfg = PHASE_CFG[phase] || PHASE_CFG.volume;
  const wi = Math.min(weekIdx, cfg.repsMain.length - 1);
  // Ziel-Reps für diese Woche
  const TM = cfg.repsMain[wi];  // Main
  const TA = cfg.repsAcc[wi];   // Accessory
  const SM = cfg.sMain;
  const SA = cfg.sAcc;
  const RM = cfg.rMain;
  const RA = cfg.rAcc;
  const RESTM = cfg.restMain;
  const RESTA = cfg.restAcc;
  // Für Anzeige im Badge: Pseudo-Prozent (Ziel/Ref als Info)
  // Wird in renderExercises per calcWeight() überschrieben
  const M = TM;  // wir übergeben targetReps statt pct
  const A = TA;

  // ── MONTAG: Beine & Pull ────────────────────────────
  if (day === 0) {
    return [
      {name:'Beinpresse',  key:'beinpresse', tr:M,  reps:RM, sets:SM, rest:RESTM, note:'Hauptübung'},
      {name:'RDLs',        key:'rdl',        tr:M,  reps:RM, sets:SM, rest:RESTM, note:'Hüftbreite, neutraler Rücken'},
      {name:'Beinbeuger',  key:'beinbeuger', tr:A,  reps:RA, sets:SA, rest:RESTA, note:''},
      {name:'Hip Thrust',  key:'hipthrust',  tr:M,  reps:RM, sets:SM, rest:RESTM, note:'Gluteus Fokus'},
      {name:'Latzug',      key:'latzug',     tr:M,  reps:RM, sets:SM, rest:RESTM, note:''},
      {name:'Rudern',      key:'rudern',     tr:M,  reps:RM, sets:SM, rest:RESTM, note:''},
      {name:'Crunches',    key:'crunches',   tr:17, reps:'15-20', sets:SA, rest:'1:00', note:''},
    ];
  }

  // ── FREITAG: Beine-Fokus (ursprünglich Samstag-Inhalt) ──
  if (day === 1) {
    return [
      {name:'Beinpresse',  key:'beinpresse', tr:Math.max(M-1,4), reps:RM, sets:SM, rest:RESTM, note:'Variante: enger Stand'},
      {name:'RDLs',        key:'rdl',        tr:M,               reps:RM, sets:SM, rest:RESTM, note:''},
      {name:'Hip Thrust',  key:'hipthrust',  tr:Math.max(M-2,4), reps:RM, sets:SM, rest:RESTM, note:'Schwerer als Montag'},
      {name:'Beinbeuger',  key:'beinbeuger', tr:A,               reps:RA, sets:SA, rest:RESTA, note:''},
      {name:'Kickbacks',   key:'kickbacks',  tr:A,               reps:RA, sets:SA, rest:RESTA, note:'Pro Seite'},
      {name:'Crunches',    key:'crunches',   tr:17,              reps:'15-20', sets:SA, rest:'1:00', note:''},
    ];
  }

  // ── SAMSTAG: OBK (ursprünglich Freitag-Inhalt) ──────────
  if (day === 2) {
    return [
      {name:'Bankdrücken',  key:'bankdruecken', tr:M, reps:RM, sets:SM, rest:RESTM, note:'Hauptübung'},
      {name:'Incline Press',key:'incline',       tr:M, reps:RM, sets:SM, rest:RESTM, note:''},
      {name:'Latzug',       key:'latzug',        tr:M, reps:RM, sets:SM, rest:RESTM, note:''},
      {name:'Rudern',       key:'rudern',        tr:A, reps:RA, sets:SA, rest:RESTA, note:''},
      {name:'Seitheben',    key:'seitheben',     tr:A, reps:RA, sets:SA, rest:RESTA, note:''},
      {name:'Bizeps Curl',  key:'bizeps',        tr:A, reps:RA, sets:SA, rest:RESTA, note:''},
      {name:'Trizeps',      key:'trizeps',       tr:A, reps:RA, sets:SA, rest:RESTA, note:''},
      {name:'Crunches',     key:'crunches',      tr:17, reps:'15-20', sets:SA, rest:'1:00', note:''},
    ];
  }

  return [];
}

// ── STATE ────────────────────────────────────────────────
let state = {phase:'volume', week:1, day:0};

// ── STORAGE ──────────────────────────────────────────────
const SKEY_XRM = 'jenni_xrm_v1';

function getXRM() {
  try { const s=localStorage.getItem(SKEY_XRM); if(s) return {...XRM_DEFAULTS,...JSON.parse(s)}; } catch(e){}
  return {...XRM_DEFAULTS};
}
function saveXRMData(d) { localStorage.setItem(SKEY_XRM,JSON.stringify(d)); }

function lk(phase,week,day,ei,si){ return `jenni_log_${phase}_w${week}_d${day}_e${ei}_s${si}`; }
function getLog(phase,week,day,ei,si){ try{return JSON.parse(localStorage.getItem(lk(phase,week,day,ei,si)));}catch(e){return null;} }
function setLog(phase,week,day,ei,si,d){ localStorage.setItem(lk(phase,week,day,ei,si),JSON.stringify(d)); }
function delLog(phase,week,day,ei,si){ localStorage.removeItem(lk(phase,week,day,ei,si)); }

// ── UTILS ────────────────────────────────────────────────
function r25(v){ return Math.round((Number(v)||0)/2.5)*2.5; }
function fmtKg(v){ const n=Number(v)||0; return Number.isInteger(n)?String(n):n.toFixed(1).replace(/\.0$/,''); }
function countDone(exIdx,sets){
  let n=0;
  for(let s=0;s<sets;s++){ const l=getLog(state.phase,state.week,state.day,exIdx,s); if(l&&l.done)n++; }
  return n;
}

// ── RENDER ───────────────────────────────────────────────
function renderAll(){ renderPhaseTabs(); renderWeekSelector(); renderDayTabs(); renderExercises(); }

function renderPhaseTabs(){
  document.getElementById('phaseTabs').innerHTML = PHASES.map(p=>
    `<button class="phase-tab ${state.phase===p.id?'active':''}" onclick="selectPhase('${p.id}')">${p.label}</button>`
  ).join('');
}

function renderWeekSelector(){
  const n=(PHASES.find(p=>p.id===state.phase)||{weeks:4}).weeks;
  document.getElementById('weekSelector').innerHTML=
    `<span class="week-label">Woche</span><div class="week-btns">${
      Array.from({length:n},(_,i)=>
        `<button class="week-btn ${state.week===i+1?'active':''}" onclick="selectWeek(${i+1})">${i+1}</button>`
      ).join('')
    }</div>`;
}

function renderDayTabs(){
  document.getElementById('dayTabs').innerHTML = DAY_LABELS.map((d,i)=>
    `<button class="day-tab ${state.day===i?'active':''}" onclick="selectDay(${i})">${d}</button>`
  ).join('');
}

function renderExercises(){
  const xrm=getXRM();
  const wi=state.week-1;
  const exs=buildExercises(state.phase,wi,state.day);
  const el=document.getElementById('exList');

  if(!exs.length){
    el.innerHTML=`<div class="empty"><div style="font-size:40px;margin-bottom:10px">🏖️</div><div>Kein Training heute</div></div>`;
    updateProgress(0,0); return;
  }

  let done=0,total=0;
  const dayLabel=DAY_LABELS[state.day];
  const daySub=DAY_SUBTITLES[state.day];
  let html=`<div class="section-label">${dayLabel} – ${daySub}</div>`;

  exs.forEach((ex,i)=>{
    const w=calcWeight(xrm, ex.key, ex.tr);
    const d=countDone(i,ex.sets);
    done+=d; total+=ex.sets;
    const logged=d===ex.sets;
    // Zeige Ziel-Reps als Info-Badge (statt Prozent)
    const refReps = XRM_REF_REPS[ex.key]||10;
    const oneRM = r25(epleyWeight(xrm[ex.key]||0, refReps, 1));
    const pctOf1rm = oneRM>0 ? Math.round((w/oneRM)*100) : 0;
    html+=`
    <div class="ex-card ${logged?'logged':''}" id="ec_${i}">
      <div class="ex-header" onclick="toggleEx(${i})">
        <div class="ex-index">${String(i+1).padStart(2,'0')}</div>
        <div class="ex-title">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.sets} Sätze × ${ex.reps} Wdh &middot; ${ex.rest} Pause &middot; ${d}/${ex.sets} geloggt</div>
        </div>
        <div class="ex-badge">
          <span class="badge badge-weight">${fmtKg(w)} kg</span>
          <span class="badge badge-pct">${pctOf1rm}% 1RM</span>
        </div>
      </div>
      <div class="ex-body" id="eb_${i}">
        <div class="info-grid">
          <div class="info-cell"><div class="info-val">${fmtKg(w)}</div><div class="info-key">kg</div></div>
          <div class="info-cell"><div class="info-val">${ex.reps}</div><div class="info-key">Wdh</div></div>
          <div class="info-cell"><div class="info-val">${ex.sets}</div><div class="info-key">Sätze</div></div>
        </div>
        ${ex.note?`<div class="notes-badge">💡 ${ex.note}</div>`:''}
        <div class="set-log-list">${buildSetRows(ex,i,w)}</div>
        <div class="exercise-actions">
          <button class="action-btn primary" onclick="markAllDone(${i})">Alle speichern</button>
          <button class="action-btn" onclick="clearAll(${i})">Zurücksetzen</button>
        </div>
      </div>
    </div>`;
  });

  el.innerHTML=html;
  updateProgress(done,total);
}

function buildSetRows(ex,exIdx,weight){
  let html='';
  for(let s=0;s<ex.sets;s++){
    const l=getLog(state.phase,state.week,state.day,exIdx,s);
    html+=`
      <div class="set-row">
        <div class="set-number">S ${s+1}</div>
        <div class="log-input-wrap">
          <input class="log-input" type="number" inputmode="decimal" id="kg_${exIdx}_${s}" placeholder="${fmtKg(weight)}" value="${l?l.kg:''}" step="0.5">
          <div class="log-label">kg</div>
        </div>
        <div class="log-input-wrap">
          <input class="log-input" type="number" inputmode="numeric" id="rp_${exIdx}_${s}" placeholder="${String(ex.reps).split('-')[0]||'10'}" value="${l?l.reps:''}" step="1">
          <div class="log-label">Wdh</div>
        </div>
        <button class="set-save-btn ${l&&l.done?'saved':''}" onclick="event.stopPropagation();saveSet(${exIdx},${s})">${l&&l.done?'✓ Ok':'Speichern'}</button>
      </div>`;
  }
  return html;
}

function updateProgress(done,total){
  const pct=total?(done/total)*100:0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${done} / ${total} Sätze geloggt`;
}

// ── ACTIONS ──────────────────────────────────────────────
function toggleEx(i){ document.getElementById(`eb_${i}`)?.classList.toggle('open'); }

function saveSet(exIdx,setIdx){
  const kg=document.getElementById(`kg_${exIdx}_${setIdx}`)?.value||'';
  const reps=document.getElementById(`rp_${exIdx}_${setIdx}`)?.value||'';
  setLog(state.phase,state.week,state.day,exIdx,setIdx,{kg,reps,done:true});
  renderExercises();
  document.getElementById(`eb_${exIdx}`)?.classList.add('open');
  showToast('Satz gespeichert');
}

function markAllDone(exIdx){
  const xrm=getXRM();
  const exs=buildExercises(state.phase,state.week-1,state.day);
  const ex=exs[exIdx]; if(!ex)return;
  const w=calcWeight(xrm, ex.key, ex.tr);
  for(let s=0;s<ex.sets;s++){
    const kg=document.getElementById(`kg_${exIdx}_${s}`)?.value||fmtKg(w);
    const reps=document.getElementById(`rp_${exIdx}_${s}`)?.value||'';
    setLog(state.phase,state.week,state.day,exIdx,s,{kg,reps,done:true});
  }
  renderExercises();
  document.getElementById(`eb_${exIdx}`)?.classList.add('open');
  showToast('Übung gespeichert');
}

function clearAll(exIdx){
  const exs=buildExercises(state.phase,state.week-1,state.day);
  const ex=exs[exIdx]; if(!ex)return;
  for(let s=0;s<ex.sets;s++) delLog(state.phase,state.week,state.day,exIdx,s);
  renderExercises();
  document.getElementById(`eb_${exIdx}`)?.classList.add('open');
  showToast('Gelöscht');
}

function selectPhase(id){ state.phase=id; state.week=1; state.day=0; renderAll(); }
function selectWeek(w){ state.week=w; renderAll(); }
function selectDay(d){ state.day=d; renderDayTabs(); renderExercises(); }

// ── XRM MODAL ────────────────────────────────────────────
function openSettings(){
  const xrm=getXRM();
  let html='';
  XRM_DEFS.forEach(g=>{
    html+=`<div class="xrm-group"><div class="xrm-group-title">${g.group}</div>`;
    g.items.forEach(item=>{
      html+=`
        <div class="xrm-row">
          <div class="xrm-label-wrap">
            <span class="xrm-label">${item.label}</span>
            ${item.hint?`<span class="xrm-hint">${item.hint}</span>`:''}
          </div>
          <input class="xrm-input" type="number" inputmode="decimal" id="xi_${item.key}" value="${xrm[item.key]||0}" step="0.5" min="0">
          <span class="xrm-unit">kg</span>
        </div>`;
    });
    html+='</div>';
  });
  document.getElementById('xrmFields').innerHTML=html;
  document.getElementById('xrmModal').classList.add('open');
}

function saveXRM(){
  const d={};
  XRM_DEFS.forEach(g=>g.items.forEach(item=>{
    const el=document.getElementById('xi_'+item.key);
    if(el) d[item.key]=parseFloat(el.value)||0;
  }));
  saveXRMData(d);
  document.getElementById('xrmModal').classList.remove('open');
  renderExercises();
  showToast('XRM gespeichert ✓');
}

function closeOnOverlay(e){
  if(e.target===document.getElementById('xrmModal'))
    document.getElementById('xrmModal').classList.remove('open');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

window.addEventListener('DOMContentLoaded',renderAll);
</script>
</body>
</html>
